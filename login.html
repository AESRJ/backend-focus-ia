<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar sesión - Focus IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .error {
        color: #ef4444;
        font-size: 0.875rem;
        margin-top: 4px;
        display: block;
      }
      .input-error {
        border-color: #ef4444 !important;
        box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.2);
      }

      /* ── Toast Notification Styles ── */
      #toastContainer {
        position: fixed;
        top: 24px;
        right: 24px;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        gap: 12px;
        pointer-events: none;
      }

      .toast {
        pointer-events: auto;
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 320px;
        max-width: 420px;
        padding: 16px 20px;
        border-radius: 16px;
        font-size: 0.9rem;
        color: #fff;
        backdrop-filter: blur(12px);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
        animation: toastSlideIn 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      .toast.toast-exit {
        animation: toastSlideOut 0.35s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }

      .toast-error {
        background: linear-gradient(135deg, rgba(220, 38, 38, 0.92), rgba(153, 27, 27, 0.92));
      }

      .toast-warning {
        background: linear-gradient(135deg, rgba(217, 119, 6, 0.92), rgba(180, 83, 9, 0.92));
      }

      .toast-success {
        background: linear-gradient(135deg, rgba(5, 150, 105, 0.92), rgba(4, 120, 87, 0.92));
      }

      .toast-icon {
        font-size: 1.3rem;
        flex-shrink: 0;
      }

      .toast-body {
        flex: 1;
      }

      .toast-title {
        font-weight: 700;
        margin-bottom: 2px;
      }

      .toast-message {
        opacity: 0.9;
        font-size: 0.82rem;
        line-height: 1.4;
      }

      .toast-close {
        background: none;
        border: none;
        color: rgba(255, 255, 255, 0.6);
        cursor: pointer;
        font-size: 1.1rem;
        padding: 4px;
        border-radius: 8px;
        transition: all 0.2s;
        flex-shrink: 0;
      }
      .toast-close:hover {
        color: #fff;
        background: rgba(255, 255, 255, 0.1);
      }

      .toast-progress {
        position: absolute;
        bottom: 0;
        left: 0;
        height: 3px;
        background: rgba(255, 255, 255, 0.35);
        border-radius: 0 0 16px 16px;
        animation: toastProgress 5s linear forwards;
      }

      @keyframes toastSlideIn {
        from {
          opacity: 0;
          transform: translateX(80px) scale(0.95);
        }
        to {
          opacity: 1;
          transform: translateX(0) scale(1);
        }
      }
      @keyframes toastSlideOut {
        from {
          opacity: 1;
          transform: translateX(0) scale(1);
        }
        to {
          opacity: 0;
          transform: translateX(80px) scale(0.95);
        }
      }
      @keyframes toastProgress {
        from { width: 100%; }
        to   { width: 0%; }
      }

      /* shake animation for invalid input */
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        20%      { transform: translateX(-6px); }
        40%      { transform: translateX(6px); }
        60%      { transform: translateX(-4px); }
        80%      { transform: translateX(4px); }
      }
      .shake {
        animation: shake 0.4s ease-in-out;
      }
    </style>
  </head>
  <body class="bg-zinc-950 text-white min-h-screen flex items-center justify-center font-sans">

    <!-- Toast Container -->
    <div id="toastContainer"></div>

    <div class="max-w-md w-full bg-zinc-900 p-10 rounded-3xl shadow-2xl">

      <h1 class="text-4xl font-bold text-center mb-2 text-emerald-400">Focus IA</h1>
      <p class="text-center mb-8 text-zinc-400">Inicia sesión para continuar</p>

      <form id="loginForm" class="space-y-6">
        <div>
          <label class="block text-sm mb-1">Correo electrónico <span class="text-red-400">*</span></label>
          <input
            id="email"
            type="text"
            required
            placeholder="ej. TuCorreo@correo.com"
            class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-emerald-500 transition-all duration-200"
          />
          <span id="emailError" class="error" style="display:none"></span>
        </div>

        <div>
          <label class="block text-sm mb-1">Contraseña <span class="text-red-400">*</span></label>
          <input
            id="password"
            type="password"
            required
            class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-emerald-500 transition-all duration-200"
          />
          <span id="passwordError" class="error" style="display:none"></span>
        </div>

        <button
          id="submitBtn"
          type="submit"
          disabled
          class="w-full bg-emerald-600 hover:bg-emerald-500 py-4 rounded-2xl font-semibold text-lg disabled:bg-zinc-700 disabled:cursor-not-allowed transition-colors"
        >
          Iniciar sesión
        </button>

        <p id="serverError" class="hidden text-red-400 text-sm text-center mt-2"></p>
      </form>

      <p id="successMessage" class="hidden text-emerald-400 text-center mt-6 font-medium"></p>

      <p class="text-center text-zinc-400 mt-6">
        ¿No tienes cuenta?
        <a href="register.html" class="text-emerald-400 hover:underline">Regístrate aquí</a>
      </p>
    </div>

    <script>
      const form = document.getElementById('loginForm');
      const btn = document.getElementById('submitBtn');
      const successMsg = document.getElementById('successMessage');
      const toastContainer = document.getElementById('toastContainer');

      /* ── Toast Notification System ── */
      function showToast(type, title, message, duration = 5000) {
        const icons = {
          error: '❌',
          warning: '⚠️',
          success: '✅',
        };

        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        toast.style.position = 'relative';
        toast.innerHTML = `
          <span class="toast-icon">${icons[type] || '🔔'}</span>
          <div class="toast-body">
            <div class="toast-title">${title}</div>
            <div class="toast-message">${message}</div>
          </div>
          <button class="toast-close" aria-label="Cerrar">&times;</button>
          <div class="toast-progress"></div>
        `;

        // Close button
        toast.querySelector('.toast-close').addEventListener('click', () => dismissToast(toast));

        toastContainer.appendChild(toast);

        // Auto-dismiss
        const timer = setTimeout(() => dismissToast(toast), duration);
        toast._timer = timer;
      }

      function dismissToast(toast) {
        if (toast._dismissed) return;
        toast._dismissed = true;
        clearTimeout(toast._timer);
        toast.classList.add('toast-exit');
        toast.addEventListener('animationend', () => toast.remove());
      }

      /* ── Validation Helpers ── */
      function isValidEmail(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
      }

      function showError(fieldId, errorId, message) {
        const field = document.getElementById(fieldId);
        field.classList.add('input-error');
        // Add shake animation
        field.classList.add('shake');
        field.addEventListener('animationend', () => field.classList.remove('shake'), { once: true });

        const error = document.getElementById(errorId);
        error.textContent = message;
        error.style.display = 'block';
      }

      function clearError(fieldId, errorId) {
        document.getElementById(fieldId).classList.remove('input-error');
        const error = document.getElementById(errorId);
        error.textContent = '';
        error.style.display = 'none';
      }

      function toggleButton() {
        const email = document.getElementById('email').value.trim();
        const pass = document.getElementById('password').value.trim();
        btn.disabled = !(email && pass);
      }

      document.querySelectorAll('input').forEach(input => {
        input.addEventListener('input', toggleButton);
      });

      /* ── Inline Validation on Blur ── */
      document.getElementById('email').addEventListener('blur', () => {
        const val = document.getElementById('email').value.trim();
        if (!val) {
          showError('email', 'emailError', 'El correo electrónico es obligatorio');
        } else if (!isValidEmail(val)) {
          showError('email', 'emailError', 'Utiliza un correo válido');
        } else {
          clearError('email', 'emailError');
        }
      });

      document.getElementById('password').addEventListener('blur', () => {
        const val = document.getElementById('password').value;
        if (!val) {
          showError('password', 'passwordError', 'La contraseña es obligatoria');
          showToast('warning', 'Campo obligatorio', 'Debes ingresar tu contraseña para iniciar sesión.');
        } else {
          clearError('password', 'passwordError');
        }
      });

      /* ── Form Validation ── */
      function validateForm() {
        let valid = true;
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        if (!email) {
          showError('email', 'emailError', 'El correo electrónico es obligatorio');
          valid = false;
        } else if (!isValidEmail(email)) {
          showError('email', 'emailError', 'Utiliza un correo válido');
          valid = false;
        } else {
          clearError('email', 'emailError');
        }

        if (!password) {
          showError('password', 'passwordError', 'La contraseña es obligatoria');
          showToast('warning', 'Campo obligatorio', 'Debes ingresar tu contraseña para iniciar sesión.');
          valid = false;
        } else {
          clearError('password', 'passwordError');
        }

        return valid;
      }

      /* ── Form Submit ── */
      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        if (!validateForm()) return;

        btn.disabled = true;
        btn.textContent = 'Iniciando sesión...';
        successMsg.classList.add('hidden');
        document.getElementById('serverError').classList.add('hidden');

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        const formData = new URLSearchParams();
        formData.append('username', email);
        formData.append('password', password);

        try {
          const res = await fetch('https://backend-focus-ia-production.up.railway.app/auth/jwt/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: formData.toString(),
          });

          const result = await res.json();

          if (res.ok) {
            localStorage.setItem('access_token', result.access_token);
            successMsg.textContent = '✅ Inicio de sesión exitoso';
            successMsg.classList.remove('hidden');
            showToast('success', '¡Bienvenido!', 'Inicio de sesión exitoso. Redirigiendo...');
            form.reset();
            setTimeout(() => {
              window.location.href = '../pages/dashboard.html';
            }, 1500);
          } else {
            // Detect incorrect password / credentials
            const detail = result.detail || '';
            const errorMsg = typeof detail === 'string' ? detail : 'Credenciales incorrectas';

            if (
              errorMsg.toLowerCase().includes('password') ||
              errorMsg.toLowerCase().includes('incorrect') ||
              errorMsg.toLowerCase().includes('invalid') ||
              errorMsg.toLowerCase().includes('login_bad_credentials') ||
              res.status === 400 ||
              res.status === 401
            ) {
              showError('password', 'passwordError', 'La contraseña es incorrecta');
              showToast(
                'error',
                'Contraseña incorrecta',
                'La contraseña que ingresaste no es válida. Verifica e intenta nuevamente.'
              );
            } else {
              showError('email', 'emailError', errorMsg);
              showToast('error', 'Error de autenticación', errorMsg);
            }
          }
        } catch (err) {
          console.error(err);
          const serverError = document.getElementById('serverError');
          serverError.textContent = 'Error de conexión con el servidor. ¿Está corriendo el backend?';
          serverError.classList.remove('hidden');
          showToast(
            'error',
            'Error de conexión',
            'No se pudo conectar con el servidor. Intenta más tarde.'
          );
        } finally {
          btn.textContent = 'Iniciar sesión';
          btn.disabled = false;
          toggleButton();
        }
      });
    </script>
  </body>
</html>
